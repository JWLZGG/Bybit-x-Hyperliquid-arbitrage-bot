services:
  arbitrage-bot:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    volumes:
      - ./.env:/app/.env:ro
      - ./logs:/app/logs
      - ./data:/app/data
    ports:
      - "8080:8080"
    restart: unless-stopped
    command: ["python", "-m", "bot.main"]
